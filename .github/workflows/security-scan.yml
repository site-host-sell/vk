name: Security Scan

on:
  push:
    branches:
      - "**"
  pull_request:

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Scan tracked files
        run: node scripts/security-scan.mjs

      - name: Scan git history
        run: node scripts/security-scan-history.mjs
